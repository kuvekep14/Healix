<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healix — Redirecting</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0B0B0B;
      color: #f8f8f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container { max-width: 400px; padding: 24px; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { font-size: 15px; color: #9ca3af; line-height: 1.5; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #333;
      border-top-color: #14b8a6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #14b8a6;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
    .manual { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Opening Healix...</h1>
    <div class="spinner"></div>
    <p>You should be redirected to the app automatically.</p>

    <div class="manual" id="manual">
      <p>If the app didn't open, your email has been verified. Go back to Healix and log in.</p>
      <a href="healix://auth-callback">Open Healix</a>
    </div>
  </div>

  <script>
    (function () {
      // Supabase puts tokens in the URL fragment (#access_token=...&type=signup).
      // Forward the full fragment to the app's deep link so the Supabase client
      // can exchange them for a session.
      var fragment = window.location.hash || '';
      var query = window.location.search || '';

      // Build the deep link. Append both query and fragment in case either carries data.
      var deepLink = 'healix://auth-callback' + query + fragment;

      // Try to open the app
      window.location.href = deepLink;

      // If we're still here after 2s, the app didn't open — show manual instructions
      setTimeout(function () {
        document.getElementById('manual').style.display = 'block';
      }, 2000);
    })();
  </script>
</body>
</html>
