<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://mfjfcfuwjbhqgqmtmhwe.supabase.co https://nuihvxluxdpdjgkvtdih.supabase.co http://127.0.0.1:54321; img-src 'self' data:; frame-ancestors 'none';">
<title>Healix — Check Your Email</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
html, body { height: 100%; }
body {
  font-family: var(--B); background: var(--dark); color: var(--cream);
  min-height: 100vh; display: flex; flex-direction: column;
}

/* BG */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 60%, rgba(184,151,90,.07), transparent 65%),
    radial-gradient(ellipse 40% 35% at 15% 80%, rgba(184,151,90,.04), transparent 55%),
    radial-gradient(ellipse 35% 30% at 85% 20%, rgba(184,151,90,.03), transparent 50%);
}
.bg-lines {
  position: fixed; inset: 0; z-index: 0; opacity: .018;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 79px, var(--gold) 80px),
    repeating-linear-gradient(90deg, transparent, transparent 79px, var(--gold) 80px);
}

/* NAV */
nav {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 48px; border-bottom: 1px solid var(--gold-border);
}
.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.logo-mark { width: 28px; height: 28px; border: 1px solid var(--gold); display: grid; place-items: center; font-size: 11px; color: var(--gold); }
.logo-text { font-family: var(--F); font-size: 18px; font-weight: 300; letter-spacing: .25em; color: var(--cream); }

/* MAIN */
main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 60px 24px; position: relative; z-index: 1;
}
.card {
  max-width: 520px; width: 100%;
  background: var(--dark-2); border: 1px solid var(--gold-border);
  padding: 64px 56px; text-align: center;
  animation: fadeUp .6s ease forwards;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

.envelope {
  width: 72px; height: 72px; border: 1px solid var(--gold-border);
  display: grid; place-items: center; margin: 0 auto 32px;
  font-size: 30px; background: var(--gold-faint);
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(184,151,90,0); border-color: var(--gold-border); }
  50% { box-shadow: 0 0 0 8px rgba(184,151,90,0); border-color: rgba(184,151,90,.4); }
}

.card-eyebrow { font-size: 10px; letter-spacing: .3em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
.card-title { font-family: var(--F); font-size: clamp(32px, 5vw, 52px); font-weight: 300; line-height: 1.05; margin-bottom: 16px; }
.card-title em { font-style: italic; color: var(--gold); }
.card-body { font-size: 15px; color: var(--cream-dim); line-height: 1.75; margin-bottom: 12px; }
.card-email { font-size: 14px; color: var(--cream); font-weight: 500; margin-bottom: 36px; letter-spacing: .02em; }

.card-divider { height: 1px; background: var(--gold-border); margin: 36px 0; }

/* Steps */
.steps { text-align: left; display: flex; flex-direction: column; gap: 18px; margin-bottom: 36px; }
.step { display: flex; gap: 16px; align-items: flex-start; }
.step-num { width: 22px; height: 22px; border: 1px solid var(--gold-border); display: grid; place-items: center; font-size: 10px; color: var(--gold); flex-shrink: 0; font-family: var(--F); margin-top: 1px; }
.step-text { font-size: 13px; color: var(--cream-dim); line-height: 1.6; }
.step-text strong { color: var(--cream); font-weight: 500; }

/* Resend */
.resend-wrap { margin-bottom: 28px; }
.resend-btn {
  background: none; border: 1px solid var(--gold-border); color: var(--cream-dim);
  font-family: var(--B); font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
  padding: 12px 28px; cursor: pointer; transition: border-color .2s, color .2s, background .2s;
}
.resend-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-faint); }
.resend-btn:disabled { opacity: .4; cursor: not-allowed; }
.resend-countdown { font-size: 11px; color: var(--muted); margin-top: 10px; }

.back-link { font-size: 13px; color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: color .2s; }
.back-link:hover { color: var(--cream-dim); }

/* Alert */
.form-alert { padding: 12px 16px; border: 1px solid; font-size: 13px; line-height: 1.5; margin-bottom: 20px; display: none; text-align: left; }
.form-alert.show { display: block; }
.form-alert.success { border-color: var(--success-border); background: var(--success-bg); color: var(--up); }
.form-alert.error { border-color: var(--error-border); background: var(--error-bg); color: var(--error); }

@media (max-width: 600px) {
  nav { padding: 20px 24px; }
  .card { padding: 40px 28px; }
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-lines"></div>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark">H</div>
    <span class="logo-text">HEALIX</span>
  </a>
</nav>

<main>
  <div class="card">
    <div class="envelope">✉</div>
    <div class="card-eyebrow">One more step</div>
    <h1 class="card-title">Check your<br><em>inbox</em></h1>
    <p class="card-body">We sent a confirmation link to</p>
    <p class="card-email" id="email-display">your email address</p>

    <div class="form-alert" id="form-alert"></div>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">Open the email from <strong>noreply@usehealix.com</strong></div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">Click <strong>Confirm your account</strong> to verify your email</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">You'll be taken straight into <strong>Healix</strong> — ready to go</div>
      </div>
    </div>

    <div class="card-divider"></div>

    <div class="resend-wrap">
      <button class="resend-btn" id="resend-btn" onclick="resendEmail()">Resend confirmation email</button>
      <div class="resend-countdown" id="resend-countdown"></div>
    </div>

    <a href="signup.html" class="back-link">← Back to sign up</a>
  </div>
</main>

<script src="config.js"></script>
<script>
// Show the email address they signed up with
var pendingEmail = localStorage.getItem('healix_pending_email');
if (pendingEmail) {
  document.getElementById('email-display').textContent = pendingEmail;
}

function showAlert(msg, type) {
  var el = document.getElementById('form-alert');
  el.textContent = msg;
  el.className = 'form-alert show ' + (type || 'error');
}

// Resend with cooldown
var resendCooldown = 0;
var cooldownInterval = null;

function resendEmail() {
  if (!pendingEmail) {
    showAlert('No email address found. Please sign up again.');
    return;
  }
  var btn = document.getElementById('resend-btn');
  btn.disabled = true;

  fetch(SUPABASE_URL + '/auth/v1/resend', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
    },
    body: JSON.stringify({ type: 'signup', email: pendingEmail })
  }).then(function() {
    showAlert('Confirmation email resent! Check your inbox (and spam folder).', 'success');
    startCooldown(60);
  }).catch(function() {
    showAlert('Could not resend email. Please try again in a moment.');
    btn.disabled = false;
  });
}

function startCooldown(seconds) {
  resendCooldown = seconds;
  var countdown = document.getElementById('resend-countdown');
  if (cooldownInterval) clearInterval(cooldownInterval);
  cooldownInterval = setInterval(function() {
    resendCooldown--;
    if (resendCooldown <= 0) {
      clearInterval(cooldownInterval);
      document.getElementById('resend-btn').disabled = false;
      countdown.textContent = '';
    } else {
      countdown.textContent = 'You can resend in ' + resendCooldown + 's';
    }
  }, 1000);
}

// Handle the confirmation redirect from Supabase
// Two possible flows:
//   1. Implicit: #access_token=... in URL hash
//   2. PKCE:     ?code=... in URL query params (newer Supabase default)

function storeSessionAndRedirect(accessToken, refreshToken, expiresIn, user) {
  localStorage.setItem('healix_session', JSON.stringify({
    access_token: accessToken,
    refresh_token: refreshToken,
    expires_at: Date.now() + (expiresIn || 3600) * 1000,
    user: user || null
  }));
  localStorage.removeItem('healix_pending_email');
  // Clear tokens from URL to prevent exposure in browser history
  if (window.history && window.history.replaceState) {
    window.history.replaceState(null, '', window.location.pathname);
  }
  // Create profile row if it doesn't exist yet
  if (accessToken) {
    createProfileIfMissing(accessToken, user).then(function() {
      window.location.href = 'dashboard.html';
    }).catch(function() {
      window.location.href = 'dashboard.html';
    });
  } else {
    window.location.href = 'dashboard.html';
  }
}

function createProfileIfMissing(token, user) {
  // Check if a profile row exists; if not, create one
  return fetch(SUPABASE_URL + '/rest/v1/profiles?auth_user_id=eq.' + (user && user.id ? user.id : 'unknown') + '&limit=1', {
    method: 'GET',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + token
    }
  }).then(function(r) { return r.json(); }).then(function(rows) {
    if (rows && rows.length > 0) return; // profile exists
    // Get user info to populate profile
    return fetch(SUPABASE_URL + '/auth/v1/user', {
      method: 'GET',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + token
      }
    }).then(function(r) { return r.json(); }).then(function(userData) {
      if (!userData || !userData.id) return;
      var fullName = (userData.user_metadata && userData.user_metadata.full_name) || '';
      var parts = fullName.split(' ');
      // Minimal row — DB defaults handle NOT NULL columns (birth_date, gender, height_cm, etc.)
      return fetch(SUPABASE_URL + '/rest/v1/profiles', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + token,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          auth_user_id: userData.id,
          first_name: parts[0] || '',
          last_name: parts.slice(1).join(' ') || '',
          email: userData.email || ''
        })
      });
    });
  });
}

// Flow 1: Implicit — #access_token in hash
var hash = window.location.hash;
if (hash && hash.includes('access_token')) {
  var params = new URLSearchParams(hash.replace('#', '?'));
  var accessToken = params.get('access_token');
  var refreshToken = params.get('refresh_token');
  if (accessToken) {
    storeSessionAndRedirect(accessToken, refreshToken, 3600, null);
  }
}

// Flow 2: PKCE — ?code= in query params
var queryParams = new URLSearchParams(window.location.search);
var authCode = queryParams.get('code');
if (authCode) {
  fetch(SUPABASE_URL + '/auth/v1/token?grant_type=pkce', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY
    },
    body: JSON.stringify({ auth_code: authCode })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.access_token) {
      storeSessionAndRedirect(data.access_token, data.refresh_token, data.expires_in, data.user);
    } else {
      // PKCE exchange failed — try as authorization_code grant
      return fetch(SUPABASE_URL + '/auth/v1/token?grant_type=authorization_code', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ code: authCode })
      }).then(function(r) { return r.json(); }).then(function(data2) {
        if (data2.access_token) {
          storeSessionAndRedirect(data2.access_token, data2.refresh_token, data2.expires_in, data2.user);
        } else {
          showAlert('Email confirmed but auto-login failed. Please sign in manually.', 'error');
          console.error('PKCE exchange error:', data, data2);
        }
      });
    }
  }).catch(function(err) {
    showAlert('Email confirmed but auto-login failed. Please sign in manually.', 'error');
    console.error('PKCE fetch error:', err);
  });
}
</script>
</body>
</html>
