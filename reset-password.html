<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://mfjfcfuwjbhqgqmtmhwe.supabase.co https://nuihvxluxdpdjgkvtdih.supabase.co http://127.0.0.1:54321; img-src 'self' data:; frame-ancestors 'none';">
<title>Healix — Reset Password</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#B8975A">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
html, body { height: 100%; }
body {
  font-family: var(--B); background: var(--dark); color: var(--cream);
  display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh;
}

/* ── LEFT PANEL ── */
.left {
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 48px; border-right: 1px solid var(--gold-border);
}
.left-bg {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 30% 70%, rgba(184,151,90,.07), transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 20%, rgba(184,151,90,.04), transparent 50%);
}
.left-lines {
  position: absolute; inset: 0; z-index: 0; opacity: .018;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 79px, var(--gold) 80px),
    repeating-linear-gradient(90deg, transparent, transparent 79px, var(--gold) 80px);
}
.left-content { position: relative; z-index: 1; }
.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.logo-mark { width: 30px; height: 30px; border: 1px solid var(--gold); display: grid; place-items: center; font-size: 12px; color: var(--gold); }
.logo-text { font-family: var(--F); font-size: 20px; font-weight: 300; letter-spacing: .25em; color: var(--cream); }
.left-bottom { position: relative; z-index: 1; }
.left-quote { font-family: var(--F); font-size: clamp(32px, 3.5vw, 52px); font-weight: 300; line-height: 1.1; margin-bottom: 28px; }
.left-quote em { font-style: italic; color: var(--gold); }

/* ── RIGHT PANEL ── */
.right {
  display: flex; align-items: center; justify-content: center;
  padding: 48px; background: var(--dark-2); overflow-y: auto;
}
.form-wrap { width: 100%; max-width: 400px; }
.form-eyebrow { font-size: 10px; letter-spacing: .3em; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.form-eyebrow::before { content: ''; display: block; width: 24px; height: 1px; background: var(--gold); }
.form-title { font-family: var(--F); font-size: 42px; font-weight: 300; line-height: 1.05; margin-bottom: 8px; }
.form-title em { font-style: italic; color: var(--gold); }
.form-sub { font-size: 14px; color: var(--cream-dim); margin-bottom: 40px; line-height: 1.6; }

/* Form fields */
.field { margin-bottom: 18px; }
.field-label { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; display: block; }
.field-input {
  width: 100%; background: var(--dark-3); border: 1px solid var(--gold-border);
  color: var(--cream); font-family: var(--B); font-size: 14px;
  padding: 14px 18px; outline: none; transition: border-color .2s;
}
.field-input::placeholder { color: var(--muted); }
.field-input:focus { border-color: var(--gold-focus); }
.field-input.error { border-color: var(--error); }
.field-error { font-size: 11px; color: var(--error); margin-top: 6px; display: none; }
.field-error.show { display: block; }

/* Password strength */
.pwd-strength { margin-top: 8px; }
.pwd-bar-track { height: 2px; background: var(--gold-border); margin-bottom: 6px; }
.pwd-bar-fill { height: 100%; width: 0%; transition: width .3s, background .3s; }
.pwd-label { font-size: 10px; letter-spacing: .1em; color: var(--muted); }

/* Submit */
.submit-btn {
  width: 100%; padding: 16px; background: var(--gold); border: none;
  color: var(--dark); font-family: var(--B); font-size: 11px; font-weight: 500;
  letter-spacing: .2em; text-transform: uppercase; cursor: pointer;
  transition: background .25s, transform .2s, box-shadow .25s;
  margin-top: 8px; position: relative;
}
.submit-btn:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 10px 36px var(--gold-glow); }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
.submit-btn .btn-spinner { display: none; width: 14px; height: 14px; border: 2px solid rgba(11,11,11,.3); border-top-color: var(--dark); border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto; }
.submit-btn.loading .btn-text { display: none; }
.submit-btn.loading .btn-spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Alert */
.form-alert { padding: 14px 18px; border: 1px solid; font-size: 13px; line-height: 1.5; margin-bottom: 20px; display: none; }
.form-alert.show { display: block; }
.form-alert.error { border-color: var(--error-border); background: var(--error-bg); color: var(--error); }
.form-alert.success { border-color: var(--success-border); background: var(--success-bg); color: var(--up); }

/* Switch link */
.switch-link { text-align: center; font-size: 13px; color: var(--cream-dim); margin-top: 24px; }
.switch-link a { color: var(--gold); text-decoration: none; transition: color .2s; }
.switch-link a:hover { color: var(--gold-light); }

/* Animations */
.form-wrap > * { opacity: 0; animation: slideUp .5s ease forwards; }
.form-wrap > *:nth-child(1) { animation-delay: .05s; }
.form-wrap > *:nth-child(2) { animation-delay: .1s; }
.form-wrap > *:nth-child(3) { animation-delay: .15s; }
.form-wrap > *:nth-child(4) { animation-delay: .2s; }
.form-wrap > *:nth-child(5) { animation-delay: .25s; }
.form-wrap > *:nth-child(6) { animation-delay: .3s; }
.form-wrap > *:nth-child(7) { animation-delay: .35s; }
.form-wrap > *:nth-child(8) { animation-delay: .4s; }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 768px) {
  body { grid-template-columns: 1fr; }
  .left { display: none; }
  .right { padding: 40px 24px; align-items: flex-start; padding-top: 80px; }
}
</style>
</head>
<body>

<!-- LEFT -->
<div class="left">
  <div class="left-bg"></div>
  <div class="left-lines"></div>
  <div class="left-content">
    <a href="index.html" class="logo">
      <div class="logo-mark">H</div>
      <span class="logo-text">HEALIX</span>
    </a>
  </div>
  <div class="left-bottom">
    <p class="left-quote">A fresh start for<br>your <em>health journey.</em></p>
  </div>
</div>

<!-- RIGHT -->
<div class="right">
  <div class="form-wrap">
    <div class="form-eyebrow">Account recovery</div>
    <h1 class="form-title">Set a new<br><em>password</em></h1>
    <p class="form-sub">Choose a strong password for your Healix account.</p>

    <div class="form-alert" id="form-alert"></div>

    <div class="field">
      <label class="field-label" for="password">New password</label>
      <input class="field-input" type="password" id="password" placeholder="Min. 12 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
      <div class="pwd-strength">
        <div class="pwd-bar-track"><div class="pwd-bar-fill" id="pwd-bar"></div></div>
        <div class="pwd-label" id="pwd-label">&mdash;</div>
      </div>
      <div class="field-error" id="password-error">Password must be at least 12 characters.</div>
    </div>

    <div class="field">
      <label class="field-label" for="confirm">Confirm password</label>
      <input class="field-input" type="password" id="confirm" placeholder="Re-enter your password" autocomplete="new-password">
      <div class="field-error" id="confirm-error">Passwords do not match.</div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="handleReset()">
      <span class="btn-text">Update Password</span>
      <div class="btn-spinner"></div>
    </button>

    <p class="switch-link"><a href="login.html">&larr; Back to sign in</a></p>
  </div>
</div>

<script src="config.js"></script>
<script>
// ── Helpers ──

function showAlert(msg, type) {
  var el = document.getElementById('form-alert');
  el.textContent = msg;
  el.className = 'form-alert show ' + (type || 'error');
}
function hideAlert() {
  document.getElementById('form-alert').className = 'form-alert';
}

function setLoading(loading) {
  var btn = document.getElementById('submit-btn');
  btn.classList.toggle('loading', loading);
  btn.disabled = loading;
}

function checkStrength(val) {
  var bar = document.getElementById('pwd-bar');
  var label = document.getElementById('pwd-label');
  if (!val) { bar.style.width = '0%'; label.textContent = '\u2014'; label.style.color = 'var(--muted)'; return; }
  var score = 0;
  if (val.length >= 12) score++;
  if (val.length >= 16) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  var levels = [
    { w: '20%', color: 'var(--error)', text: 'Too short' },
    { w: '40%', color: 'var(--warn)', text: 'Weak' },
    { w: '60%', color: 'var(--warn)', text: 'Fair' },
    { w: '80%', color: 'var(--up)', text: 'Good' },
    { w: '100%', color: 'var(--up)', text: 'Strong' }
  ];
  var l = levels[Math.min(score, 4)];
  bar.style.width = l.w;
  bar.style.background = l.color;
  label.textContent = l.text;
  label.style.color = l.color;
}

// ── Token extraction ──

var recoveryToken = null;
var recoveryRefreshToken = null;
var recoveryExpiresIn = null;
var recoveryUser = null;

// Flow 1: Implicit — #access_token=...&type=recovery in hash
var hash = window.location.hash;
if (hash && hash.includes('access_token')) {
  var hashParams = new URLSearchParams(hash.replace('#', '?'));
  var tokenType = hashParams.get('type');
  if (tokenType === 'recovery') {
    recoveryToken = hashParams.get('access_token');
    recoveryRefreshToken = hashParams.get('refresh_token');
    // Clear tokens from URL
    if (window.history && window.history.replaceState) {
      window.history.replaceState(null, '', window.location.pathname);
    }
  }
}

// Flow 2: PKCE — ?code= in query params
var queryParams = new URLSearchParams(window.location.search);
var authCode = queryParams.get('code');

if (authCode && !recoveryToken) {
  fetch(SUPABASE_URL + '/auth/v1/token?grant_type=pkce', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY
    },
    body: JSON.stringify({ auth_code: authCode })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.access_token) {
      recoveryToken = data.access_token;
      recoveryRefreshToken = data.refresh_token;
      recoveryExpiresIn = data.expires_in;
      recoveryUser = data.user;
      // Clear code from URL
      if (window.history && window.history.replaceState) {
        window.history.replaceState(null, '', window.location.pathname);
      }
    } else {
      // Fallback: try authorization_code grant
      return fetch(SUPABASE_URL + '/auth/v1/token?grant_type=authorization_code', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ code: authCode })
      }).then(function(r) { return r.json(); }).then(function(data2) {
        if (data2.access_token) {
          recoveryToken = data2.access_token;
          recoveryRefreshToken = data2.refresh_token;
          recoveryExpiresIn = data2.expires_in;
          recoveryUser = data2.user;
        } else {
          showAlert('This reset link is invalid or has expired. Please request a new one from the login page.');
          document.getElementById('submit-btn').disabled = true;
        }
      });
    }
  }).catch(function() {
    showAlert('Could not verify your reset link. Please try again.');
    document.getElementById('submit-btn').disabled = true;
  });
}

// No token at all — user navigated here directly
if (!hash && !authCode) {
  showAlert('No reset token found. Please use the link from your email, or request a new reset from the login page.');
  document.getElementById('submit-btn').disabled = true;
}

// ── Password update ──

function handleReset() {
  hideAlert();
  var password = document.getElementById('password').value;
  var confirm = document.getElementById('confirm').value;
  var valid = true;

  // Clear previous errors
  document.getElementById('password').classList.remove('error');
  document.getElementById('confirm').classList.remove('error');
  document.getElementById('password-error').classList.remove('show');
  document.getElementById('confirm-error').classList.remove('show');

  if (password.length < 12) {
    document.getElementById('password').classList.add('error');
    document.getElementById('password-error').classList.add('show');
    valid = false;
  }
  if (password !== confirm) {
    document.getElementById('confirm').classList.add('error');
    document.getElementById('confirm-error').classList.add('show');
    valid = false;
  }
  if (!recoveryToken) {
    showAlert('Reset token is missing or expired. Please request a new password reset from the login page.');
    valid = false;
  }
  if (!valid) return;

  setLoading(true);

  fetch(SUPABASE_URL + '/auth/v1/user', {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + recoveryToken
    },
    body: JSON.stringify({ password: password })
  }).then(function(r) { return r.json(); }).then(function(data) {
    setLoading(false);
    if (data.error || data.error_description || data.msg) {
      showAlert(data.error_description || data.msg || data.error || 'Could not update password. The link may have expired.');
    } else if (data.id || data.email) {
      // Password updated — store session and redirect to dashboard
      localStorage.setItem('healix_session', JSON.stringify({
        access_token: recoveryToken,
        refresh_token: recoveryRefreshToken || null,
        expires_at: Date.now() + (recoveryExpiresIn || 3600) * 1000,
        user: data
      }));
      window.location.href = 'dashboard.html';
    } else {
      console.error('[ResetPassword] Unexpected response:', data);
      showAlert('Something went wrong. Please try again or request a new reset link.');
    }
  }).catch(function(err) {
    setLoading(false);
    console.error('[ResetPassword] Network error:', err);
    showAlert('Unable to connect. Please check your connection and try again.');
  });
}

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleReset();
});
</script>
</body>
</html>
