<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healix — Sharing Updated</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#B8975A">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
html, body { height: 100%; }
body {
  font-family: var(--B); background: var(--dark); color: var(--cream);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 24px; padding: 40px;
}
.dep-icon { font-size: 48px; opacity: .5; }
.dep-title {
  font-family: var(--F); font-size: 28px; font-weight: 300;
  color: var(--cream); text-align: center;
}
.dep-text {
  font-size: 14px; color: var(--cream-dim); text-align: center;
  max-width: 420px; line-height: 1.7;
}
.dep-cta {
  font-size: 10px; letter-spacing: .15em; text-transform: uppercase;
  padding: 12px 24px; background: var(--gold); color: var(--dark); border: none;
  font-family: var(--B); font-weight: 500; cursor: pointer; transition: background .2s;
  text-decoration: none; margin-top: 8px;
}
.dep-cta:hover { background: var(--gold-light); }
</style>
</head>
<body>
  <div class="dep-icon">◯</div>
  <div class="dep-title">Sharing has been upgraded</div>
  <div class="dep-text">
    Token-based sharing links have been replaced with account-based sharing.
    Ask the dashboard owner to grant access to your Healix account email from
    their Profile settings.
  </div>
  <a href="https://usehealix.com/login.html" class="dep-cta">Sign in to Healix</a>
</body>
</html>
