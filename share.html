<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://mfjfcfuwjbhqgqmtmhwe.supabase.co https://nuihvxluxdpdjgkvtdih.supabase.co http://127.0.0.1:54321; img-src 'self' data:; frame-ancestors 'none';">
<title>Healix — Shared Dashboard</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#B8975A">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
html, body { height: 100%; }
body {
  font-family: var(--B); background: var(--dark); color: var(--cream);
  display: flex; flex-direction: column; min-height: 100vh;
}

/* ── HEADER ── */
.share-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 36px; border-bottom: 1px solid var(--gold-border);
  background: var(--dark-2);
}
.share-header-left { display: flex; align-items: center; gap: 12px; }
.share-logo {
  width: 28px; height: 28px; border: 1px solid var(--gold);
  display: grid; place-items: center; font-size: 11px; color: var(--gold); flex-shrink: 0;
}
.share-logo-text { font-family: var(--F); font-size: 17px; font-weight: 300; letter-spacing: .25em; color: var(--cream); }
.share-shared-by { font-size: 12px; color: var(--cream-dim); margin-left: 16px; padding-left: 16px; border-left: 1px solid var(--gold-border); }
.share-cta {
  font-size: 10px; letter-spacing: .15em; text-transform: uppercase;
  padding: 9px 18px; background: var(--gold); color: var(--dark); border: none;
  font-family: var(--B); font-weight: 500; cursor: pointer; transition: background .2s;
  text-decoration: none;
}
.share-cta:hover { background: var(--gold-light); }

/* ── CONTENT ── */
.share-content {
  flex: 1; overflow-y: auto; padding: 36px;
  max-width: 1100px; width: 100%; margin: 0 auto;
}

/* ── VITALITY HERO ── */
.share-vitality {
  text-align: center; padding: 48px 0 40px; margin-bottom: 32px;
  border-bottom: 1px solid var(--gold-border);
}
.share-vitality-label {
  font-size: 9px; letter-spacing: .3em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 12px;
}
.share-vitality-age {
  font-family: var(--F); font-size: 96px; font-weight: 300;
  color: var(--cream); line-height: 1;
}
.share-vitality-delta {
  font-size: 16px; font-weight: 500; margin-top: 8px;
}
.share-vitality-composite {
  font-size: 12px; color: var(--muted); margin-top: 12px;
}

/* ── DRIVER CARDS ── */
.share-drivers {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px; margin-bottom: 32px;
}
.share-driver {
  background: var(--dark-2); border: 1px solid var(--gold-border);
  padding: 20px; transition: border-color .2s;
}
.share-driver:hover { border-color: var(--gold-hover); }
.share-driver-label {
  font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 10px;
}
.share-driver-val {
  font-family: var(--F); font-size: 26px; font-weight: 300; color: var(--cream);
  margin-bottom: 10px;
}
.share-driver-bar {
  height: 3px; background: var(--cream-faint); position: relative;
}
.share-driver-fill {
  height: 100%; position: absolute; left: 0; top: 0; transition: width .6s ease;
}
.share-driver-status {
  font-size: 10px; color: var(--muted); margin-top: 8px;
}

/* ── SECTIONS ── */
.share-section {
  margin-bottom: 32px;
}
.share-section-title {
  font-family: var(--F); font-size: 22px; font-weight: 300; margin-bottom: 16px;
}
.share-section-title em { font-style: italic; color: var(--gold); }

/* ── BLOODWORK TABLE ── */
.share-bw-table {
  width: 100%; border-collapse: collapse;
}
.share-bw-table th {
  text-align: left; font-size: 9px; letter-spacing: .15em; text-transform: uppercase;
  color: var(--muted); padding: 10px 12px; border-bottom: 1px solid var(--gold-border);
}
.share-bw-table td {
  padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--cream-faint);
}
.share-bw-table tr:hover { background: var(--gold-faint); }
.flag-h { color: var(--down); font-weight: 600; }
.flag-l { color: var(--warn); font-weight: 600; }
.flag-normal { color: var(--muted); }

/* ── FITNESS TESTS ── */
.share-fitness-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px;
}
.share-fitness-card {
  background: var(--dark-2); border: 1px solid var(--gold-border); padding: 18px;
}
.share-fitness-type {
  font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 8px;
}
.share-fitness-val {
  font-family: var(--F); font-size: 24px; font-weight: 300; color: var(--cream);
}
.share-fitness-unit { font-size: 12px; color: var(--muted); margin-left: 4px; }
.share-fitness-pct {
  font-size: 10px; margin-top: 6px; padding: 2px 8px; display: inline-block;
}
.pct-good { background: rgba(184,151,90,.12); color: var(--gold); }
.pct-great { background: rgba(111,207,138,.12); color: var(--up); }
.pct-low { background: rgba(224,112,112,.12); color: var(--down); }

/* ── FOOTER ── */
.share-footer {
  text-align: center; padding: 24px; font-size: 11px; color: var(--muted);
  border-top: 1px solid var(--gold-border);
}

/* ── ERROR / LOADING ── */
.share-loading, .share-error {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px; padding: 60px;
}
.share-error-icon { font-size: 48px; opacity: .5; }
.share-error-text {
  font-family: var(--F); font-size: 24px; font-weight: 300; color: var(--cream-dim);
  text-align: center;
}
.share-error-sub { font-size: 13px; color: var(--muted); text-align: center; }

.share-spinner {
  width: 32px; height: 32px; border: 2px solid var(--gold-border);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .share-header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
  .share-shared-by { margin-left: 0; padding-left: 0; border-left: none; }
  .share-content { padding: 20px; }
  .share-vitality-age { font-size: 64px; }
  .share-drivers { grid-template-columns: 1fr 1fr; }
  .share-fitness-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="share-header">
  <div class="share-header-left">
    <div class="share-logo">H</div>
    <span class="share-logo-text">HEALIX</span>
    <span class="share-shared-by" id="shared-by"></span>
  </div>
  <a href="https://usehealix.com" class="share-cta">Get Your Vitality Age</a>
</div>

<!-- Loading state -->
<div class="share-loading" id="share-loading">
  <div class="share-spinner"></div>
  <div style="font-size:13px;color:var(--muted)">Loading dashboard...</div>
</div>

<!-- Error state -->
<div class="share-error" id="share-error" style="display:none">
  <div class="share-error-icon">◯</div>
  <div class="share-error-text">This link is no longer active</div>
  <div class="share-error-sub">The owner may have revoked access to this dashboard.</div>
  <a href="https://usehealix.com" class="share-cta" style="margin-top:16px">Learn about Healix</a>
</div>

<!-- Dashboard content -->
<div class="share-content" id="share-content" style="display:none">

  <!-- Vitality Age Hero -->
  <div class="share-vitality">
    <div class="share-vitality-label">Vitality Age</div>
    <div class="share-vitality-age" id="sv-age">—</div>
    <div class="share-vitality-delta" id="sv-delta"></div>
    <div class="share-vitality-composite" id="sv-composite"></div>
  </div>

  <!-- Driver Cards -->
  <div class="share-drivers" id="sv-drivers"></div>

  <!-- Bloodwork -->
  <div class="share-section" id="sv-bloodwork-section" style="display:none">
    <div class="share-section-title">Blood <em>Work</em></div>
    <table class="share-bw-table">
      <thead><tr><th>Biomarker</th><th>Value</th><th>Unit</th><th>Reference</th><th>Flag</th></tr></thead>
      <tbody id="sv-bloodwork"></tbody>
    </table>
  </div>

  <!-- Fitness Tests -->
  <div class="share-section" id="sv-fitness-section" style="display:none">
    <div class="share-section-title">Fitness <em>Assessment</em></div>
    <div class="share-fitness-grid" id="sv-fitness"></div>
  </div>

  <!-- Last updated -->
  <div class="share-footer" id="sv-footer"></div>
</div>

<script src="config.js"></script>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');

  if (!token) {
    showError();
    return;
  }

  loadSharedDashboard(token);

  function showError() {
    document.getElementById('share-loading').style.display = 'none';
    document.getElementById('share-error').style.display = 'flex';
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  async function loadSharedDashboard(shareToken) {
    try {
      var response = await fetch(SUPABASE_URL + '/functions/v1/get-shared-dashboard', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ shareToken: shareToken })
      });

      if (!response.ok) {
        showError();
        return;
      }

      var data = await response.json();
      if (data.error) {
        showError();
        return;
      }

      renderDashboard(data);
    } catch (e) {
      console.error('[Share] Failed to load:', e, e.stack);
      showError();
    }
  }

  function renderDashboard(data) {
    document.getElementById('share-loading').style.display = 'none';
    document.getElementById('share-content').style.display = 'block';

    var profile = data.profile;

    // Header
    if (profile && profile.firstName) {
      document.getElementById('shared-by').textContent = 'Shared by ' + profile.firstName;
    }

    // Calculate age
    var realAge = null;
    if (profile && profile.birthDate) {
      var bd = new Date(profile.birthDate + 'T12:00:00');
      var now = new Date();
      realAge = now.getFullYear() - bd.getFullYear();
      if (now.getMonth() < bd.getMonth() || (now.getMonth() === bd.getMonth() && now.getDate() < bd.getDate())) {
        realAge--;
      }
    }

    // Extract metrics for vitality age
    var metrics = buildMetrics(data, profile, realAge);
    var result = calcVitalityAge(metrics, realAge);

    // Render Vitality Age
    if (result && result.vAge) {
      document.getElementById('sv-age').textContent = result.vAge;
      if (realAge) {
        var diff = realAge - result.vAge;
        var deltaEl = document.getElementById('sv-delta');
        if (diff > 0) {
          deltaEl.textContent = diff + ' years younger than real age';
          deltaEl.style.color = 'var(--up)';
        } else if (diff < 0) {
          deltaEl.textContent = Math.abs(diff) + ' years older than real age';
          deltaEl.style.color = 'var(--down)';
        } else {
          deltaEl.textContent = 'Same as real age';
          deltaEl.style.color = 'var(--muted)';
        }
      }
      document.getElementById('sv-composite').textContent = 'Composite score: ' + result.composite + ' / 100';
    }

    // Render driver cards
    renderDrivers(result);

    // Render bloodwork
    renderBloodwork(data.bloodwork);

    // Render fitness tests
    renderFitness(data.fitnessTests);

    // Footer
    var latestDate = findLatestDate(data);
    if (latestDate) {
      document.getElementById('sv-footer').textContent = 'Last updated ' + new Date(latestDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }
  }

  // ── METRICS EXTRACTION ──

  function buildMetrics(data, profile, realAge) {
    var samples = data.healthSamples || [];

    // Resting HR — latest value
    var hr = null;
    for (var i = 0; i < samples.length; i++) {
      if (samples[i].metric_type === 'resting_heart_rate' && samples[i].value) {
        hr = parseFloat(samples[i].value);
        break;
      }
    }

    // Weight score
    var weightVal = null;
    var weightScore = null;
    if (profile && profile.currentWeightKg && profile.heightCm) {
      weightVal = profile.currentWeightKg;
      var bmi = profile.currentWeightKg / Math.pow(profile.heightCm / 100, 2);
      weightScore = scoreWeight(bmi);
    }

    // Bloodwork
    var bwMap = {};
    (data.bloodwork || []).forEach(function(b) {
      if (b.value !== null && !bwMap[b.biomarker_name]) {
        bwMap[b.biomarker_name] = b;
      }
    });

    // Fitness / strength
    var strengthData = null;
    var tests = data.fitnessTests || [];
    if (tests.length > 0) {
      var pcts = tests.filter(function(t) { return t.percentile != null; }).map(function(t) { return t.percentile; });
      if (pcts.length > 0) {
        var avg = pcts.reduce(function(a, b) { return a + b; }, 0) / pcts.length;
        strengthData = { avgPercentile: avg };
      }
    }

    // VO2 max
    var vo2 = null;
    for (var j = 0; j < tests.length; j++) {
      if (tests[j].test_key === 'vo2max' && tests[j].raw_value) {
        vo2 = parseFloat(tests[j].raw_value);
        break;
      }
    }

    return {
      realAge: realAge,
      sex: profile ? profile.gender : null,
      hr: hr,
      weightScore: weightScore,
      weightVal: weightVal,
      bloodwork: bwMap,
      strengthData: strengthData,
      vo2max: vo2
    };
  }

  // ── SCORING FUNCTIONS (simplified mirrors of dashboard.js) ──

  function scoreHR(hr) {
    if (!hr || hr <= 0) return null;
    // Gaussian centered at 56 bpm, sigma ~15
    var optimal = 56;
    var sigma = 15;
    var z = (hr - optimal) / sigma;
    return Math.max(0, Math.min(100, Math.round(100 * Math.exp(-0.5 * z * z))));
  }

  function scoreWeight(bmi) {
    if (!bmi || bmi <= 0) return null;
    // J-curve centered at BMI 22
    var optimal = 22;
    var diff = bmi - optimal;
    var penalty = diff > 0 ? diff * diff * 0.8 : diff * diff * 0.5;
    return Math.max(0, Math.min(100, Math.round(100 - penalty)));
  }

  function scoreBloodwork(bwMap) {
    if (!bwMap || Object.keys(bwMap).length === 0) return null;
    var scores = [];
    Object.keys(bwMap).forEach(function(name) {
      var b = bwMap[name];
      if (b.value === null) return;
      // Simple flag-based scoring
      if (!b.flag || b.flag === '') {
        scores.push(80);
      } else if (b.flag === 'H' || b.flag === 'L') {
        scores.push(40);
      } else if (b.flag === 'A') {
        scores.push(30);
      } else {
        scores.push(70);
      }
    });
    if (scores.length === 0) return null;
    return Math.round(scores.reduce(function(a, b) { return a + b; }, 0) / scores.length);
  }

  function scoreStrength(strengthData) {
    if (!strengthData || strengthData.avgPercentile == null) return null;
    return Math.round(strengthData.avgPercentile);
  }

  function scoreVO2(vo2) {
    if (!vo2) return null;
    // Simplified: map typical VO2 max range (20-60) to 0-100
    return Math.max(0, Math.min(100, Math.round((vo2 - 20) * 2.5)));
  }

  function calcVitalityAge(metrics, realAge) {
    var weights = {
      bloodwork: 0.35,
      hr: 0.30,
      weight: 0.20,
      strength: 0.10,
      aerobic: 0.05
    };

    var scores = [];
    var hrScore = metrics.hr ? scoreHR(metrics.hr) : null;
    var bwScore = scoreBloodwork(metrics.bloodwork);
    var strScore = scoreStrength(metrics.strengthData);
    var vo2Score = scoreVO2(metrics.vo2max);
    var wScore = metrics.weightScore;

    var all = [
      { name: 'hr', label: 'Heart Rate', score: hrScore, weight: weights.hr },
      { name: 'weight', label: 'Weight', score: wScore, weight: weights.weight },
      { name: 'strength', label: 'Strength', score: strScore, weight: weights.strength },
      { name: 'aerobic', label: 'VO2 Max', score: vo2Score, weight: weights.aerobic },
      { name: 'bloodwork', label: 'Blood Work', score: bwScore, weight: weights.bloodwork }
    ];

    var totalWeight = 0;
    var weightedSum = 0;
    all.forEach(function(s) {
      if (s.score !== null && s.score !== undefined) {
        scores.push(s);
        totalWeight += s.weight;
      }
    });

    if (totalWeight === 0 || scores.length === 0) {
      return { vAge: null, composite: 0, scores: all };
    }

    scores.forEach(function(s) {
      weightedSum += s.score * (s.weight / totalWeight);
    });

    var composite = Math.round(weightedSum);
    var adjustment = (composite - 70) / 5;
    var vAge = realAge ? Math.round(realAge - adjustment) : null;
    if (vAge !== null && realAge) {
      vAge = Math.max(realAge - 20, Math.min(realAge + 20, vAge));
    }

    return { vAge: vAge, composite: composite, scores: all };
  }

  // ── RENDER FUNCTIONS ──

  function renderDrivers(result) {
    var container = document.getElementById('sv-drivers');
    var scores = result.scores || [];
    var html = '';

    var icons = { hr: '♡', weight: '⊖', strength: '◈', aerobic: '◎', bloodwork: '◐' };
    var valLabels = { hr: 'bpm', weight: '', strength: '', aerobic: 'ml/kg/min', bloodwork: '' };

    scores.forEach(function(s) {
      var score = s.score;
      var status = score === null ? 'No data' : score >= 70 ? 'Good' : score >= 40 ? 'Fair' : 'Needs work';
      var barColor = score === null ? 'var(--cream-faint)' : score >= 70 ? 'var(--up)' : score >= 40 ? 'var(--gold)' : 'var(--down)';
      var barWidth = score !== null ? score + '%' : '0%';

      html += '<div class="share-driver">';
      html += '<div class="share-driver-label">' + escapeHtml(s.label) + '</div>';
      html += '<div class="share-driver-val">' + (score !== null ? score : '—') + '</div>';
      html += '<div class="share-driver-bar"><div class="share-driver-fill" style="width:' + barWidth + ';background:' + barColor + '"></div></div>';
      html += '<div class="share-driver-status">' + status + '</div>';
      html += '</div>';
    });

    container.innerHTML = html;
  }

  function renderBloodwork(bloodwork) {
    if (!bloodwork || bloodwork.length === 0) return;

    document.getElementById('sv-bloodwork-section').style.display = 'block';
    var tbody = document.getElementById('sv-bloodwork');

    // Deduplicate — keep only latest per biomarker
    var seen = {};
    var unique = [];
    bloodwork.forEach(function(b) {
      if (!seen[b.biomarker_name]) {
        seen[b.biomarker_name] = true;
        unique.push(b);
      }
    });

    var html = '';
    unique.forEach(function(b) {
      var flagCls = b.flag === 'H' ? 'flag-h' : b.flag === 'L' ? 'flag-l' : 'flag-normal';
      var flagLabel = b.flag === 'H' ? 'HIGH' : b.flag === 'L' ? 'LOW' : b.flag === 'A' ? 'ABN' : 'Normal';
      html += '<tr>';
      html += '<td>' + escapeHtml(b.biomarker_name) + '</td>';
      html += '<td><strong>' + (b.value !== null ? b.value : escapeHtml(b.value_text || '—')) + '</strong></td>';
      html += '<td>' + escapeHtml(b.unit || '') + '</td>';
      html += '<td>' + escapeHtml(b.reference_range || '') + '</td>';
      html += '<td class="' + flagCls + '">' + flagLabel + '</td>';
      html += '</tr>';
    });

    tbody.innerHTML = html;
  }

  function renderFitness(tests) {
    if (!tests || tests.length === 0) return;

    document.getElementById('sv-fitness-section').style.display = 'block';
    var container = document.getElementById('sv-fitness');

    // Deduplicate — latest per test type
    var seen = {};
    var unique = [];
    tests.forEach(function(t) {
      if (!seen[t.test_key]) {
        seen[t.test_key] = true;
        unique.push(t);
      }
    });

    var testLabels = {
      bench_1rm: 'Bench Press', squat_1rm: 'Squat', deadlift_1rm: 'Deadlift',
      pushup: 'Push-ups', pullup: 'Pull-ups', mile_time: 'Mile Time',
      vo2max: 'VO2 Max', walk_6min: '6-Min Walk', grip_strength: 'Grip Strength',
      dead_hang: 'Dead Hang', farmers_walk: "Farmer's Walk", plank: 'Plank',
      chair_stand: 'Chair Stand', balance: 'Balance', toe_touch: 'Toe Touch',
      shoulder_reach: 'Shoulder Reach'
    };

    var html = '';
    unique.forEach(function(t) {
      var label = testLabels[t.test_key] || t.test_key;
      var pctCls = t.percentile >= 70 ? 'pct-great' : t.percentile >= 40 ? 'pct-good' : 'pct-low';

      html += '<div class="share-fitness-card">';
      html += '<div class="share-fitness-type">' + escapeHtml(label) + '</div>';
      html += '<div><span class="share-fitness-val">' + t.raw_value + '</span>';
      if (t.unit) html += '<span class="share-fitness-unit">' + escapeHtml(t.unit) + '</span>';
      html += '</div>';
      if (t.percentile != null) {
        html += '<div class="share-fitness-pct ' + pctCls + '">' + Math.round(t.percentile) + 'th percentile</div>';
      }
      html += '</div>';
    });

    container.innerHTML = html;
  }

  function findLatestDate(data) {
    var dates = [];
    (data.healthSamples || []).forEach(function(s) { if (s.recorded_at) dates.push(s.recorded_at); });
    (data.bloodwork || []).forEach(function(b) { if (b.test_date) dates.push(b.test_date); });
    (data.fitnessTests || []).forEach(function(t) { if (t.tested_at) dates.push(t.tested_at); });
    (data.weightLogs || []).forEach(function(w) { if (w.recorded_at) dates.push(w.recorded_at); });
    if (dates.length === 0) return null;
    dates.sort();
    return dates[dates.length - 1];
  }
})();
</script>
</body>
</html>
